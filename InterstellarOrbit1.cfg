//   Author: iLikeGothMommys
//	CONTRACT: FIRST CONTRACT
CONTRACT_TYPE
{
    name = Tourism_InterstellarOrbit1Tourist
    group = interstellar
    genericTitle = Ferry one tourist to an exo-planet
    genericDescription = Ferry one tourist to an exo-planet and bring them back safely.

    title = Ferry @TourismOverhaul:touristCount.Print() @TourismOverhaul:tourists to @targetBody
    description = A tourist heard about our ability to travel to another star and is interested in our capabilities, they are willing to pay a large check.
    synopsis = Ferry one tourist to @targetBody and return them safely to @/homeWorldPlanet
    completedMessage = The @TourismOverhaul:tourists had a great time!

    // Level 1 prestige
    prestige = Exceptional
    targetBody = ReachedBodies().Where(b => !b.IsSun() && b.HasSurface() && !b.IsHomeWorld() && b.Parent() != HomeWorld() && (b.Parent() != HomeWorld().Parent() && (b.Parent().Parent() == HomeWorld().Parent() || b.Parent().Parent().Parent() == HomeWorld().Parent()) && (b.Parent().SemiMajorAxis() > 845252514114 || b.Parent().Parent().SemiMajorAxis() > 845252514114 || b.Parent().Parent().Parent().SemiMajorAxis() > 845252514114)) && b.Name() != "WH3141A").Random()

    // Contract rewards
    rewardFunds = 25000 + Random(0.0, 3000.0)
    rewardReputation = 8.0
    failureReputation = 9.0
	
	// Quickly Expire & Deadline
	minExpiry = 6.0
	maxExpiry = 7.0	
	
	PARAMETER
	{
		name = All
		type = All
		title = Complete @/randomKerbalName1's travel itinerary
	
		PARAMETER
		{
			name = VesselParameterGroup
			type = VesselParameterGroup
			
			title = Orbit @/targetBody
      
			PARAMETER
			{
				name = HasPassengers1
				type = HasPassengers
				kerbal = @/randomKerbalName1
				hideChildren = true
				hidden = true
			}

			PARAMETER
			{
				name = Orbit
				type = Orbit
				title = Orbit @/targetBody
				hideChildren = true
				hidden = true
				minPeA = @/targetBody.AtmosphereAltitude() + 1
			}
		}	
	
		PARAMETER
		{
			name = RecoverKerbal
			type = RecoverKerbal

			completeInSequence = true
			rewardFunds = 168000 + Random(4000.0, 6000.0)
		}
	}
	
	DATA
	{
		type = Kerbal
		title = randomly generates name for first tourist
		randomKerbalName1 = NewKerbal(Random(), @TourismOverhaul:prefixes.Random() + @TourismOverhaul:suffixes.Random() + " Kerman")
		hidden = true 
	}
	DATA 
	{
		type = CelestialBody
		hidden = true 
		homeWorldPlanet = HomeWorld()
	}
	DATA 
	{
		type = Duration 
		title = Duration Time generator
		hidden = true 
		durationTime = Random(7d, 14d)
	}
	
    BEHAVIOUR
    {
        name = SpawnPassengers1
        type = SpawnPassengers
		kerbal = @/randomKerbalName1
    }

    BEHAVIOUR
    {
        name = Expression
        type = Expression

        CONTRACT_COMPLETED_SUCCESS
        {
            TouristCount = TouristCount + @TourismOverhaul:touristCount
            TouristLowOrbitCount = TouristLowOrbitCount + @TourismOverhaul:touristCount
        }
    }

	REQUIREMENT
	{
		type = All
		name = All
		title = Must have 200 reputation and must have tourists willing to book with our agency
		hideChildren = True
		
        REQUIREMENT
        {
            name = Reputation
            type = Reputation
			title = Reputation
            minReputation = 200
        }
		REQUIREMENT 
		{
			name = FlyBy
			type = FlyBy
			checkType = MANNED
			title = Visit @/targetBody
			targetBody = @/targetBody
		}
		REQUIREMENT
		{
			name = Expression
			type = Expression
			expression = @TourismOverhaul:touristCount == 1
			title = touristCount generator
		}
	}
}